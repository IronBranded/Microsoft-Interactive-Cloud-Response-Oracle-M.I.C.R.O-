<script>
(function(){
  const canvas=document.getElementById('loader-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,nodes,edges,pulses,animId;
  const COLORS={node:['#0078d4','#00d4ff','#50e6ff','#0091b5','#005a9e'],edge:'#0d3a5c',pulse:'#00d4ff'};
  function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;initGraph();}
  function initGraph(){
    const count=Math.floor((W*H)/14000);
    nodes=Array.from({length:count},()=>{const a=Math.random()*Math.PI*2,r=.22+Math.random()*.28;return{x:W/2+Math.cos(a)*W*r*(.7+Math.random()*.5),y:H/2+Math.sin(a)*H*r*.55,r:1.5+Math.random()*2.5,color:COLORS.node[Math.floor(Math.random()*COLORS.node.length)],opacity:0,targetOpacity:.3+Math.random()*.7,birthTime:Date.now()+Math.random()*3000,pulsePhase:Math.random()*Math.PI*2};});
    edges=[];
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<160&&Math.random()<.35)edges.push({a:i,b:j,targetOpacity:.12+Math.random()*.2});}
    pulses=[];
  }
  function spawnPulse(){pulses.push({r:0,maxR:Math.max(W,H)*.65,alpha:.5,speed:2.2});}
  let lastPulse=0;
  function draw(ts){
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.6);g.addColorStop(0,'#060f1e');g.addColorStop(1,'#020509');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const now=Date.now();
    if(now-lastPulse>2200){spawnPulse();lastPulse=now;}
    pulses=pulses.filter(p=>p.r<p.maxR);
    pulses.forEach(p=>{p.r+=p.speed+p.r*.008;p.alpha=.5*(1-p.r/p.maxR);ctx.save();ctx.globalAlpha=p.alpha;ctx.strokeStyle=COLORS.pulse;ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(W/2,H/2,p.r,p.r*.55,0,0,Math.PI*2);ctx.stroke();ctx.restore();});
    nodes.forEach(n=>{if(now>n.birthTime)n.opacity=Math.min(n.opacity+.015,n.targetOpacity);});
    edges.forEach(e=>{const na=nodes[e.a],nb=nodes[e.b],vis=Math.min(na.opacity,nb.opacity);if(vis<=0)return;ctx.save();ctx.globalAlpha=vis*e.targetOpacity;ctx.strokeStyle=COLORS.edge;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(nb.x,nb.y);ctx.stroke();ctx.restore();});
    nodes.forEach(n=>{if(n.opacity<=0)return;const pulse=Math.sin(ts*.001+n.pulsePhase)*.3+.7;ctx.save();ctx.globalAlpha=n.opacity*pulse;const gd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*4);gd.addColorStop(0,n.color);gd.addColorStop(1,'transparent');ctx.fillStyle=gd;ctx.beginPath();ctx.arc(n.x,n.y,n.r*4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=n.opacity;ctx.fillStyle=n.color;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    animId=requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();spawnPulse();animId=requestAnimationFrame(draw);
  const steps=[{t:'Authenticating via Entra ID…',p:12},{t:'Establishing Microsoft Graph session…',p:26},{t:'Loading Sentinel detection rules…',p:40},{t:'Mapping artifact acquisition sources…',p:54},{t:'Correlating MITRE ATT&CK mappings…',p:68},{t:'Indexing rogue app signatures…',p:80},{t:'Building Copilot & AI detections…',p:92},{t:'Threat matrix online.',p:98}];
  const statusEl=document.getElementById('loader-status'),barEl=document.getElementById('loader-bar'),stepEl=document.getElementById('loader-step');
  const delays=[0,900,1750,2600,3450,4300,5150,6000];
  steps.forEach((s,i)=>setTimeout(()=>{statusEl.textContent=s.t;barEl.style.width=s.p+'%';stepEl.textContent=`[ ${String(i+1).padStart(2,'0')} / ${steps.length} ]`;},delays[i]));
  window.dismissLoader=function(){cancelAnimationFrame(animId);const l=document.getElementById('loader');barEl.style.width='100%';statusEl.textContent='Threat matrix ready.';setTimeout(()=>{l.style.animation='loader-out .5s ease forwards';setTimeout(()=>{l.style.display='none';},520);},350);};
  setTimeout(window.dismissLoader,7500);
})();
</script>

function RunbookTab({ runbook, threatId }) {
  const [checked, setChecked] = useState({});
  if(!runbook) return <div style={{ textAlign:'center', padding:40, color:'var(--text-dim)', fontFamily:'var(--font-mono)', fontSize:12 }}>RUNBOOK NOT AVAILABLE</div>;
  const phases = [
    { key:'triage',     label:'TRIAGE',     color:'#f87171', icon:'⚡' },
    { key:'contain',    label:'CONTAIN',    color:'#fbbf24', icon:'🛡' },
    { key:'investigate',label:'INVESTIGATE',color:'#a78bfa', icon:'🔍' },
    { key:'recover',    label:'RECOVER',    color:'#34d399', icon:'↺' },
    { key:'escalate',   label:'ESCALATE IF',color:'#f472b6', icon:'▲' },
  ];
  const total = phases.reduce((s,p) => s + (runbook[p.key]?.length||0), 0);
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  return (
    <div>
      <div style={{ marginBottom:14, padding:'10px 14px', background:'var(--bg-base)', border:'1px solid var(--border)', borderRadius:4 }}>
        <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, fontFamily:'var(--font-mono)', color:'var(--text-muted)', marginBottom:6 }}>
          <span>RUNBOOK PROGRESS</span><span style={{ color:'#00d4ff' }}>{pct}%</span>
        </div>
        <div style={{ height:3, background:'var(--border)', borderRadius:2 }}>
          <div style={{ height:3, borderRadius:2, width:`${pct}%`, background:'linear-gradient(90deg,#00d4ff,#34d399)', transition:'width .6s ease' }} />
        </div>
      </div>
      {phases.map(({ key, label, color, icon }) => {
        const items = runbook[key] || [];
        if(!items.length) return null;
        const doneCount = items.filter((_,i) => checked[`${key}-${i}`]).length;
        return (
          <div key={key} style={{ marginBottom:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
              <span style={{ fontSize:12 }}>{icon}</span>
              <span style={{ fontSize:9, fontFamily:'var(--font-mono)', letterSpacing:2, color }}>{label}</span>
              <span style={{ fontSize:9, fontFamily:'var(--font-mono)', color:'var(--text-dim)', marginLeft:'auto' }}>{doneCount}/{items.length}</span>
            </div>
            {items.map((item, i) => {
              const k = `${key}-${i}`;
              const isDone = !!checked[k];
              return (
                <div key={i} onClick={() => setChecked(p => ({ ...p, [k]: !p[k] }))}
                  style={{ display:'flex', gap:10, marginBottom:6, padding:'8px 12px', background:isDone ? `${color}08` : 'var(--bg-card)', border:`1px solid ${isDone ? color+'30' : 'var(--border)'}`, borderRadius:3, cursor:'pointer', alignItems:'flex-start', transition:'all .15s ease' }}>
                  <div style={{ width:16, height:16, borderRadius:3, flexShrink:0, marginTop:1, display:'flex', alignItems:'center', justifyContent:'center', transition:'all .15s ease', background:isDone ? `${color}25` : 'transparent', border:`1.5px solid ${isDone ? color : 'var(--border-mid)'}` }}>
                    {isDone && <span style={{ color, fontSize:10, lineHeight:1 }}>✓</span>}
                  </div>
                  <span style={{ fontSize:11, color:isDone ? `${color}cc` : 'var(--text-secondary)', fontFamily:'var(--font-mono)', lineHeight:1.5, textDecoration:isDone ? 'line-through' : 'none' }}>{item}</span>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function HeatMap({ threats, onSelect }) {
  const [expanded, setExpanded] = useState(null);
  const grid = useMemo(() => {
    const g = {};
    threats.forEach(t => {
      const k = `${t.risk.l}-${t.risk.i}`;
      if(!g[k]) g[k] = [];
      g[k].push(t);
    });
    return g;
  }, [threats]);
  const cs = (l, i) => {
    const r = l*i;
    if(r>=20) return { bg:'rgba(255,51,85,.14)',  border:'rgba(255,51,85,.45)',  glow:'#ff3355' };
    if(r>=15) return { bg:'rgba(255,80,50,.12)',  border:'rgba(255,80,50,.38)',  glow:'#ff5033' };
    if(r>=9)  return { bg:'rgba(255,136,51,.12)', border:'rgba(255,136,51,.38)', glow:'#ff8833' };
    if(r>=5)  return { bg:'rgba(255,204,0,.10)',  border:'rgba(255,204,0,.30)',  glow:'#ffcc00' };
    return         { bg:'rgba(51,170,255,.06)',  border:'rgba(51,170,255,.20)', glow:'#33aaff' };
  };
  const levels=[5,4,3,2,1], impacts=[1,2,3,4,5];
  const labels = {5:'CRITICAL',4:'HIGH',3:'MEDIUM',2:'LOW',1:'MINIMAL'};
  return (
    <div style={{ padding:'4px 0 20px' }}>
      <div style={{ marginBottom:18 }}>
        <div style={{ fontFamily:'var(--font-cond)', fontSize:18, fontWeight:800, color:'var(--text-primary)', letterSpacing:1.5 }}>Risk Heat Map</div>
        <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginTop:4 }}>Likelihood × Impact — click any cell to expand · click threat name to inspect</div>
      </div>
      <div style={{ display:'flex', gap:10 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <div style={{ writingMode:'vertical-rl', transform:'rotate(180deg)', fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-cond)', letterSpacing:3, textTransform:'uppercase', userSelect:'none' }}>Likelihood ↑</div>
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'grid', gridTemplateColumns:'100px repeat(5,1fr)', gap:5, marginBottom:5 }}>
            <div style={{ display:'flex', alignItems:'flex-end', paddingBottom:4 }}>
              <span style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-cond)', letterSpacing:2 }}>IMPACT →</span>
            </div>
            {impacts.map(imp => (
              <div key={imp} style={{ textAlign:'center', paddingBottom:6, borderBottom:'1px solid var(--border)' }}>
                <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-cond)', fontWeight:700 }}>{imp}</div>
                <div style={{ fontSize:8, color:'var(--text-dim)', fontFamily:'var(--font-mono)', marginTop:1 }}>{labels[imp]}</div>
              </div>
            ))}
          </div>
          {levels.map(l => (
            <div key={l} style={{ display:'grid', gridTemplateColumns:'100px repeat(5,1fr)', gap:5, marginBottom:5 }}>
              <div style={{ display:'flex', alignItems:'center', justifyContent:'flex-end', paddingRight:10, borderRight:'1px solid var(--border)' }}>
                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-cond)', fontWeight:700 }}>{l}</div>
                  <div style={{ fontSize:8, color:'var(--text-dim)', fontFamily:'var(--font-mono)', marginTop:1 }}>{labels[l]}</div>
                </div>
              </div>
              {impacts.map(i => {
                const key = `${l}-${i}`;
                const ct = grid[key] || [];
                const style = cs(l, i);
                const isExp = expanded === key;
                const score = l*i;
                return (
                  <div key={i} onClick={() => ct.length && setExpanded(isExp ? null : key)}
                    style={{ minHeight:90, background:ct.length ? style.bg : 'rgba(255,255,255,.015)', border:`1px solid ${ct.length ? style.border : 'var(--border)'}`, borderRadius:4, padding:'8px 9px', display:'flex', flexDirection:'column', gap:4, cursor:ct.length ? 'pointer' : 'default', transition:'all .18s ease', boxShadow:ct.length ? `0 0 ${isExp?18:6}px ${style.glow}${isExp?'30':'14'}` : 'none', position:'relative' }}>
                    <div style={{ position:'absolute', bottom:5, right:7, fontFamily:'var(--font-mono)', fontSize:18, fontWeight:700, color:ct.length ? style.glow : 'var(--border)', opacity:.18, lineHeight:1 }}>{score}</div>
                    {ct.length > 0 && (
                      <div style={{ position:'absolute', top:6, right:7, background:`${style.glow}25`, border:`1px solid ${style.glow}40`, borderRadius:10, padding:'1px 6px', fontFamily:'var(--font-mono)', fontSize:10, fontWeight:700, color:style.glow, lineHeight:1.4 }}>{ct.length}</div>
                    )}
                    {ct.length > 0 ? (
                      <>
                        {ct.slice(0, isExp ? 99 : 3).map(t => (
                          <div key={t.id} onClick={e => { e.stopPropagation(); onSelect(t); }}
                            style={{ fontSize:10.5, color:style.glow, fontFamily:'var(--font-cond)', fontWeight:700, lineHeight:1.25, letterSpacing:.3, paddingRight:20, cursor:'pointer' }}
                            onMouseEnter={e => e.currentTarget.style.opacity='.7'}
                            onMouseLeave={e => e.currentTarget.style.opacity='1'}>
                            {t.title}
                          </div>
                        ))}
                        {!isExp && ct.length > 3 && <div style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-mono)', marginTop:2 }}>+{ct.length-3} — click to expand</div>}
                      </>
                    ) : (
                      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center' }}>
                        <div style={{ width:4, height:4, borderRadius:'50%', background:'var(--border)' }} />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

                      })}
                      <td style={{ padding:'8px 12px', border:'1px solid var(--border)', color:'var(--text-muted)', fontSize:10, lineHeight:1.4 }}>{row.notes}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {section === 'rogue' && (
        <div>
          <div style={{ marginBottom:14, padding:'10px 14px', background:'rgba(255,51,85,.06)', border:'1px solid rgba(255,51,85,.2)', borderRadius:4, fontSize:11, color:'#ff9a8a', fontFamily:'var(--font-mono)', lineHeight:1.6 }}>
            ⚠ Traitorware apps are legitimate applications abused by threat actors. Presence does NOT confirm compromise — investigate the context.
          </div>
          <div style={{ display:'grid', gap:8 }}>
            {ACQUISITION_DATA.rogueApps.map((app, i) => {
              const catColor = { Traitorware:'#ff8833', Stealthware:'#f472b6', 'Offensive Tool':'#ff3355' }[app.category] || '#60a5fa';
              return (
                <div key={i} style={{ background:'var(--bg-card)', border:`1px solid ${catColor}25`, borderLeft:`3px solid ${catColor}`, borderRadius:4, padding:'13px 16px' }}>
                  <div style={{ display:'flex', alignItems:'flex-start', gap:12, marginBottom:8, flexWrap:'wrap' }}>
                    <span style={{ fontFamily:'var(--font-cond)', fontSize:15, fontWeight:700, color:'var(--text-primary)' }}>{app.name}</span>
                    <span style={{ background:`${catColor}15`, color:catColor, border:`1px solid ${catColor}30`, padding:'2px 8px', borderRadius:2, fontSize:9, fontFamily:'var(--font-cond)', fontWeight:700, letterSpacing:1.5 }}>{app.category}</span>
                  </div>
                  <div style={{ fontSize:11, color:'var(--text-secondary)', fontFamily:'var(--font-mono)', lineHeight:1.5, marginBottom:8 }}>{app.description}</div>
                  <div style={{ display:'flex', gap:6, flexWrap:'wrap', alignItems:'center' }}>
                    <span style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>PERMISSIONS:</span>
                    {app.permissions.map((p,pi) => (
                      <span key={pi} style={{ padding:'2px 7px', background:'rgba(255,136,51,.1)', border:'1px solid rgba(255,136,51,.25)', borderRadius:2, fontSize:10, fontFamily:'var(--font-mono)', color:'#ff8833' }}>{p}</span>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {section === 'perms' && (
        <div>
          <div style={{ display:'grid', gap:6 }}>
            {ACQUISITION_DATA.dangerousPermissions.map((p, i) => {
              const rc = { CRITICAL:'#ff3355', HIGH:'#ff8833', MEDIUM:'#ffcc00' }[p.risk] || '#33aaff';
              return (
                <div key={i} style={{ display:'grid', gridTemplateColumns:'220px 140px 80px 1fr', gap:0, alignItems:'center', background:i%2===0 ? 'var(--bg-panel)' : 'var(--bg-card)', border:'1px solid var(--border)', borderRadius:3, overflow:'hidden' }}>
                  <div style={{ padding:'10px 13px', fontFamily:'var(--font-mono)', fontSize:12, color:'#60a5fa', fontWeight:600, borderRight:'1px solid var(--border)' }}>{p.scope}</div>

                  <div style={{ padding:'10px 13px', borderRight:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <span style={{ background:`${rc}15`, color:rc, border:`1px solid ${rc}30`, padding:'2px 7px', borderRadius:2, fontSize:9, fontFamily:'var(--font-cond)', fontWeight:700, letterSpacing:1 }}>{p.risk}</span>
                  </div>
                  <div style={{ padding:'10px 13px', fontSize:11, color:'var(--text-secondary)', fontFamily:'var(--font-mono)', lineHeight:1.45 }}>{p.description}</div>

          </div>
        </div>
      )}
      {section === 'tools' && (
        <div>
          <div style={{ display:'grid', gap:8 }}>
            {ACQUISITION_DATA.irTools.map((tool, i) => (
              <a key={i} href={tool.url} target="_blank" rel="noopener" style={{ textDecoration:'none', display:'block', background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:4, padding:'13px 16px', transition:'all .18s ease' }}

                onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.background='var(--bg-card)'; }}>

                  <span style={{ fontSize:10, color:'var(--text-dim)', fontFamily:'var(--font-mono)', marginLeft:'auto' }}>{tool.author}</span>

                </div>

                <div style={{ marginTop:6, fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>{tool.url}</div>
              </a>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [pillar, setPillar] = useState('all');
  const [severity, setSeverity] = useState('all');
  const [search, setSearch] = useState('');
  const [view, setView] = useState('home');
  const [selected, setSelected] = useState(null);
  const [theme, setTheme] = useState('dark');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [panelKey, setPanelKey] = useState(0);

  // Apply theme to document
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  // ── Keyboard navigation ──────────────────────────────────────
  useEffect(() => {
    const handler = (e) => {
      // Don't fire when typing in search
      if(e.target.tagName === 'INPUT') return;
      const tag = e.target.tagName;
      if(tag === 'INPUT' || tag === 'TEXTAREA') return;

      if(e.key === 'Escape') {
        if(selected) { setSelected(null); return; }
        if(sidebarOpen) { setSidebarOpen(false); return; }
      }
      if(e.key === 'Enter' && selected) return;

      // j/k navigation through filtered list
      if((e.key === 'j' || e.key === 'ArrowDown') && !e.metaKey && !e.ctrlKey) {
        e.preventDefault();
        setSelected(prev => {
          const list = getFilteredThreats();
          if(!list.length) return prev;
          const next = !prev ? list[0] : list[Math.min(list.findIndex(t => t.id === prev.id) + 1, list.length - 1)];
          setPanelKey(k => k + 1);
          setTimeout(() => {
            document.querySelector('[data-threat-id="' + next.id + '"]')?.scrollIntoView({ block:'nearest', behavior:'smooth' });
          }, 0);
          return next;
        });
        if(view === 'home') setView('threats');
      }
      if((e.key === 'k' || e.key === 'ArrowUp') && !e.metaKey && !e.ctrlKey) {
        e.preventDefault();
        setSelected(prev => {
          const list = getFilteredThreats();
          if(!list.length) return prev;
          const next = !prev ? list[list.length - 1] : list[Math.max(list.findIndex(t => t.id === prev.id) - 1, 0)];
          setPanelKey(k => k + 1);
          setTimeout(() => {
            document.querySelector('[data-threat-id="' + next.id + '"]')?.scrollIntoView({ block:'nearest', behavior:'smooth' });
          }, 0);
          return next;
        });
        if(view === 'home') setView('threats');
      }
      // / to focus search
      if(e.key === '/') {
        e.preventDefault();
        document.querySelector('input[placeholder*="search"]')?.focus();
      }
      // t for table, h for heat, c for chains, a for acquisition
      if(e.key === 't' && !e.metaKey) setView('threats');
      if(e.key === 'h' && !e.metaKey) setView('heat');
      if(e.key === 'c' && !e.metaKey) setView('chains');
      if(e.key === 'a' && !e.metaKey) setView('acquisition');
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [selected, sidebarOpen, view]);

  const filtered = useMemo(() => {
    return ALL_THREATS.filter(t => {
      if(pillar !== 'all' && t.pillar !== pillar) return false;
      if(severity !== 'all' && t.severity !== severity) return false;
      if(search.trim().length > 1) {
        const q = search.toLowerCase();
        return t.title.toLowerCase().includes(q) ||
          t.shortDesc.toLowerCase().includes(q) ||
          t.sub.toLowerCase().includes(q) ||
          t.id.toLowerCase().includes(q) ||
          t.mitre?.some(m => m.id.toLowerCase().includes(q) || m.name.toLowerCase().includes(q));
      }
      return true;
    }).sort((a,b) => (SEV_META[b.severity]?.rank||0) - (SEV_META[a.severity]?.rank||0));
  }, [pillar, severity, search]);

  const stats = useMemo(() => {
    const bySev = {}, byPillar = {};
    ALL_THREATS.forEach(t => {
      bySev[t.severity] = (bySev[t.severity]||0)+1;
      byPillar[t.pillar] = (byPillar[t.pillar]||0)+1;
    });
    return { total: ALL_THREATS.length, bySev, byPillar };
  }, []);

  // Stable ref for keyboard handler to access current filtered list
  const filteredRef = React.useRef([]);
  const getFilteredThreats = () => filteredRef.current;
  filteredRef.current = filtered;

  const onSelect = useCallback(t => {
    setSelected(p => {
      if(p?.id === t.id) return null;
      setPanelKey(k => k + 1);
      return t;
    });
    if(view !== 'threats') setView('threats');
  }, [view]);

  const views = [
    { id:'home',        icon:'⊕', label:'HOME'          },
    { id:'threats',     icon:'◈', label:'THREAT MATRIX' },
    { id:'table',       icon:'≡', label:'TABLE VIEW'    },
    { id:'chains',      icon:'⟶', label:'ATTACK CHAINS' },
    { id:'heat',        icon:'▦', label:'RISK HEAT MAP' },
    { id:'acquisition', icon:'◉', label:'ACQUISITION'   },
  ];

  const pillars = [
    { id:'all',       label:'All Threats',    icon:'◈', color:'#00d4ff', count:ALL_THREATS.length },
    { id:'entra-id',  label:'Entra ID',       icon:'⬡', color:'#a78bfa', count:stats.byPillar['entra-id']||0 },
    { id:'m365',      label:'Microsoft 365',  icon:'◉', color:'#34d399', count:stats.byPillar['m365']||0 },
    { id:'azure',     label:'Azure',          icon:'◎', color:'#60a5fa', count:stats.byPillar['azure']||0 },
    { id:'copilot',   label:'Copilot & AI',   icon:'✦', color:'#f472b6', count:stats.byPillar['copilot']||0 },
  ];

  const sevs = [
    { id:'all',      label:'All',     color:'#00d4ff', count:ALL_THREATS.length },
    { id:'critical', label:'Critical',color:'#ff3355', count:stats.bySev.critical||0 },
    { id:'high',     label:'High',    color:'#ff8833', count:stats.bySev.high||0 },
    { id:'medium',   label:'Medium',  color:'#ffcc00', count:stats.bySev.medium||0 },
    { id:'low',      label:'Low',     color:'#33aaff', count:stats.bySev.low||0 },
  ];

  return (
    <div style={{ fontFamily:'var(--font-mono)', background:'var(--bg-base)', color:'var(--text-primary)', height:'100vh', display:'flex', flexDirection:'column' }}>
      <div style={{ background:'var(--bg-sidebar)', borderBottom:'1px solid var(--border)', padding:'0 20px', display:'flex', alignItems:'center', justifyContent:'space-between', minHeight:60, flexShrink:0, position:'relative', overflow:'hidden', backgroundImage:'linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px)', backgroundSize:'40px 40px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          {/* Mobile hamburger */}
          <button
            onClick={() => setSidebarOpen(o => !o)}
            style={{ display:'none', background:'none', border:'1px solid var(--border)', borderRadius:3, color:'var(--text-muted)', padding:'5px 8px', cursor:'pointer', fontSize:16, lineHeight:1 }}
            className="mobile-hamburger"
            aria-label="Toggle sidebar">☰</button>
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:7, height:7, borderRadius:'50%', background:'#00d4ff', animation:'pulse-glow 2s infinite' }} />
            <span style={{ fontFamily:'var(--font-tech)', color:'#00d4ff66', fontSize:10, letterSpacing:3 }}>v1.1</span>
          </div>
          <div style={{ width:1, height:32, background:'var(--border)' }} />
          <div style={{ cursor:'pointer' }} onClick={() => setView('home')}>
            <div style={{ fontFamily:'var(--font-cond)', fontSize:20, fontWeight:800, color:'var(--text-primary)', letterSpacing:5, lineHeight:1.1, textTransform:'uppercase' }}>M.I.C.R.O</div>
            <div style={{ fontFamily:'var(--font-tech)', fontSize:9, color:'var(--text-dim)', marginTop:2, letterSpacing:1.5 }}>MICROSOFT INTERACTIVE CLOUD RESPONSE ORACLE · {ALL_THREATS.length} SCENARIOS</div>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          {/* Severity badges — hidden on mobile */}
          <div className="header-sev-badges" style={{ display:'flex', alignItems:'center', gap:8 }}>
            {Object.entries(SEV_META).map(([sev, cfg]) => (
              <div key={sev} style={{ display:'flex', alignItems:'center', gap:5, padding:'3px 9px', background:cfg.bg, border:`1px solid ${cfg.color}20`, borderRadius:3 }}>
                <div style={{ width:5, height:5, borderRadius:'50%', background:cfg.color }} />
                <span style={{ color:cfg.color, fontSize:10, fontWeight:700, fontFamily:'var(--font-cond)', letterSpacing:1.5 }}>{sev.toUpperCase()}</span>
                <span style={{ color:cfg.color, fontSize:14, fontWeight:700, fontFamily:'var(--font-tech)' }}>{stats.bySev[sev]||0}</span>
              </div>
            ))}
          </div>
          {/* Theme toggle */}
          <button
            className="theme-btn"
            onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
            title={theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}
            aria-label="Toggle theme">
            {theme === 'dark' ? '☀' : '☾'}
          </button>
          {/* Keyboard hint */}
          <div style={{ padding:'3px 8px', border:'1px solid var(--border)', borderRadius:3, fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-mono)', letterSpacing:.5, display:'flex', gap:6 }}>
            <span title="Navigate threats">j/k</span>
            <span style={{ opacity:.4 }}>·</span>
            <span title="Search">/</span>
            <span style={{ opacity:.4 }}>·</span>
            <span title="Close">esc</span>
          </div>
        </div>
      </div>

      <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
        {/* Mobile overlay — click to close sidebar */}
        {sidebarOpen && (
          <div
            className="sidebar-overlay"
            onClick={() => setSidebarOpen(false)}
            style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.6)', zIndex:100, backdropFilter:'blur(2px)' }}
          />
        )}
        <div
          id="app-sidebar"
          className={sidebarOpen ? 'open' : ''}
          style={{ width:'var(--sidebar-w)', background:'var(--bg-sidebar)', borderRight:'1px solid var(--border)', flexShrink:0, overflowY:'auto', display:'flex', flexDirection:'column', zIndex:101 }}>
          <div style={{ padding:'12px 10px', flex:1 }}>
            <div style={{ fontSize:9, color:'var(--text-dim)', letterSpacing:2.5, marginBottom:6, fontFamily:'var(--font-cond)', padding:'0 4px' }}>NAVIGATE</div>
            {views.map(v => (
              <button key={v.id} onClick={() => { setView(v.id); setSidebarOpen(false); }}
                style={{ width:'100%', display:'flex', alignItems:'center', gap:9, padding:'6px 10px', marginBottom:2, background:view===v.id ? 'rgba(0,212,255,.08)' : 'transparent', border:view===v.id ? '1px solid rgba(0,212,255,.2)' : '1px solid transparent', borderRadius:3, color:view===v.id ? '#00d4ff' : 'var(--text-muted)', cursor:'pointer', transition:'all .15s ease' }}>
                <span style={{ fontSize:11 }}>{v.icon}</span>
                <span style={{ fontFamily:'var(--font-cond)', fontSize:12, fontWeight:view===v.id?700:400, letterSpacing:.5 }}>{v.label}</span>
              </button>
            ))}
            <div style={{ fontSize:9, color:'var(--text-dim)', letterSpacing:2.5, margin:'14px 0 6px', fontFamily:'var(--font-cond)', padding:'0 4px' }}>PILLAR</div>
            {pillars.map(p => (
              <button key={p.id} onClick={() => { setPillar(p.id); setSelected(null); if(view==='home') setView('threats'); setSidebarOpen(false); }}
                style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between', padding:'6px 10px', marginBottom:1, background:pillar===p.id ? `${p.color}12` : 'transparent', border:pillar===p.id ? `1px solid ${p.color}30` : '1px solid transparent', borderRadius:3, color:pillar===p.id ? p.color : 'var(--text-muted)', cursor:'pointer', transition:'all .15s ease' }}>
                <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                  <span style={{ fontSize:10 }}>{p.icon}</span>
                  <span style={{ fontFamily:'var(--font-cond)', fontSize:12, fontWeight:pillar===p.id?700:400 }}>{p.label}</span>
                </div>
                <span style={{ fontFamily:'var(--font-tech)', fontSize:10, opacity:.6 }}>{p.count}</span>
              </button>
            ))}
            <div style={{ fontSize:9, color:'var(--text-dim)', letterSpacing:2.5, margin:'14px 0 6px', fontFamily:'var(--font-cond)', padding:'0 4px' }}>SEVERITY</div>
            {sevs.map(s => (
              <button key={s.id} onClick={() => { setSeverity(s.id); setSelected(null); if(view==='home') setView('threats'); setSidebarOpen(false); }}
                style={{ width:'100%', display:'flex', alignItems:'center', gap:8, padding:'6px 10px', marginBottom:1, background:severity===s.id ? `${s.color}12` : 'transparent', border:severity===s.id ? `1px solid ${s.color}30` : '1px solid transparent', borderRadius:3, color:severity===s.id ? s.color : 'var(--text-muted)', cursor:'pointer', transition:'all .15s ease' }}>
                {s.id !== 'all' && <div style={{ width:5, height:5, borderRadius:'50%', background:s.color, flexShrink:0 }} />}
                <span style={{ fontFamily:'var(--font-cond)', fontSize:12, fontWeight:severity===s.id?700:400 }}>{s.label}</span>
                <span style={{ fontFamily:'var(--font-tech)', fontSize:10, opacity:.5, marginLeft:'auto' }}>{s.count}</span>
              </button>
            ))}
            {(pillar !== 'all' || severity !== 'all' || search) && (
              <button onClick={() => { setPillar('all'); setSeverity('all'); setSearch(''); }}
                style={{ width:'100%', marginTop:10, padding:'6px 10px', background:'none', border:'1px solid var(--border)', borderRadius:3, color:'var(--text-muted)', fontSize:10, fontFamily:'var(--font-cond)', letterSpacing:1.5, cursor:'pointer', transition:'all .15s ease' }}
                onMouseEnter={e => e.target.style.borderColor='rgba(255,255,255,.2)'}
                onMouseLeave={e => e.target.style.borderColor='var(--border)'}>
                ✕ CLEAR FILTERS
              </button>
            )}
          </div>
          <div style={{ padding:'8px 12px', borderTop:'1px solid var(--border)', fontSize:9, fontFamily:'var(--font-tech)', color:'var(--text-dim)' }}>

          </div>
        </div>

              <div style={{ position:'absolute', inset:0, backgroundImage:'linear-gradient(rgba(0,212,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.025) 1px,transparent 1px)', backgroundSize:'48px 48px', animation:'grid-pulse 4s ease-in-out infinite', pointerEvents:'none' }} />
              <div style={{ position:'relative', maxWidth:900, margin:'0 auto' }}>
                <div style={{ marginBottom:28 }}>
                  <div style={{ fontFamily:'var(--font-cond)', fontSize:42, fontWeight:800, letterSpacing:10, color:'#00d4ff', lineHeight:1 }}>M.I.C.R.O</div>
                  <div style={{ fontFamily:'var(--font-cond)', fontSize:12, letterSpacing:3, color:'var(--text-muted)', marginTop:5 }}>MICROSOFT INTERACTIVE CLOUD RESPONSE ORACLE</div>
                  <div style={{ height:2, width:120, background:'linear-gradient(90deg,#00d4ff,transparent)', marginTop:10 }} />
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:24 }}>
                  {[
                    { label:'TOTAL THREATS', val:stats.total,              icon:'◈', color:'#00d4ff' },
                    { label:'CRITICAL',      val:stats.bySev.critical||0,  icon:'⚠', color:'#ff3355' },
                    { label:'HIGH',          val:stats.bySev.high||0,      icon:'↑', color:'#ff8833' },
                    { label:'PILLARS',       val:4,                        icon:'⬡', color:'#a78bfa' },
                  ].map((s,i) => (
                    <div key={i} onClick={() => setView('threats')} style={{ background:'var(--bg-panel)', border:'1px solid var(--border)', borderRadius:6, padding:'14px 18px', position:'relative', overflow:'hidden', cursor:'pointer', transition:'all .18s ease' }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor=`${s.color}40`; e.currentTarget.style.transform='translateY(-2px)'; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.transform='none'; }}>
                      <div style={{ position:'absolute', top:10, right:14, fontSize:22, opacity:.07, color:s.color }}>{s.icon}</div>
                      <div style={{ fontFamily:'var(--font-cond)', fontSize:32, fontWeight:800, color:s.color, lineHeight:1 }}>{s.val}</div>
                      <div style={{ fontSize:9, fontFamily:'var(--font-tech)', letterSpacing:1.5, color:'var(--text-muted)', marginTop:4 }}>{s.label}</div>
                      <div style={{ position:'absolute', bottom:0, left:0, right:0, height:2, background:`linear-gradient(90deg,${s.color},transparent)`, opacity:.4 }} />
                    </div>
                  ))}
                </div>
                <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'var(--font-cond)', letterSpacing:2.5, marginBottom:10 }}>THREAT PILLARS</div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:12, marginBottom:24 }}>
                  {pillars.filter(p => p.id !== 'all').map(p => (
                    <div key={p.id} onClick={() => { setPillar(p.id); setView('threats'); }} style={{ background:'var(--bg-panel)', border:'1px solid var(--border)', borderRadius:6, padding:'16px', cursor:'pointer', position:'relative', overflow:'hidden', transition:'all .18s ease' }}
                      onMouseEnter={e => { e.currentTarget.style.borderColor=`${p.color}40`; e.currentTarget.style.transform='translateY(-2px)'; }}
                      onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.transform='none'; }}>
                      <div style={{ fontSize:24, marginBottom:8 }}>{p.icon}</div>
                      <div style={{ fontFamily:'var(--font-cond)', fontSize:14, fontWeight:700, color:p.color, letterSpacing:.5 }}>{p.label}</div>
                      <div style={{ fontFamily:'var(--font-tech)', fontSize:10, color:'var(--text-muted)', marginTop:5 }}>{p.count} threats · {ALL_THREATS.filter(t=>t.pillar===p.id&&t.severity==='critical').length} critical</div>
                      <div style={{ position:'absolute', bottom:0, left:0, right:0, height:2, background:`linear-gradient(90deg,${p.color},transparent)`, opacity:.35 }} />
                    </div>
                  ))}
                </div>
                <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'var(--font-cond)', letterSpacing:2.5, marginBottom:10 }}>HIGHEST RISK SCENARIOS</div>
                <div style={{ background:'var(--bg-panel)', border:'1px solid var(--border)', borderRadius:6, overflow:'hidden' }}>
                  {ALL_THREATS.map(t => ({ ...t, score: (t.risk?.l||2)*(t.risk?.i||2) })).sort((a,b) => b.score-a.score).slice(0,6).map((t,i) => {
                    const pm = PILLAR_META[t.pillar];
                    const sev = SEV_META[t.severity];
                    return (
                      <div key={t.id} onClick={() => onSelect(t)}
                        style={{ display:'flex', alignItems:'center', gap:14, padding:'10px 16px', borderBottom:i<5?'1px solid var(--border)':'none', cursor:'pointer', transition:'background .12s ease' }}
                        onMouseEnter={e => e.currentTarget.style.background='rgba(255,255,255,.03)'}
                        onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                        <span style={{ fontSize:11, width:16, textAlign:'center', color:pm.color }}>{pm.icon}</span>
                        <SevBadge severity={t.severity} />
                        <span style={{ fontFamily:'var(--font-cond)', fontSize:13, fontWeight:600, flex:1, color:'var(--text-primary)' }}>{t.title}</span>
                        <span style={{ fontSize:10, fontFamily:'var(--font-tech)', color:pm.color }}>{pm.label}</span>
                        <div style={{ textAlign:'center', flexShrink:0, minWidth:28 }}>
                          <div style={{ fontSize:16, fontWeight:700, color:t.score>=20?'#ff3355':t.score>=9?'#ff8833':'#ffcc00', fontFamily:'var(--font-tech)', lineHeight:1 }}>{t.score}</div>
                          <div style={{ fontSize:7, color:'var(--text-dim)', fontFamily:'var(--font-tech)' }}>RISK</div>
                        </div>
                        <span style={{ color:'var(--text-dim)', fontSize:11 }}>›</span>
                      </div>
                    );
                  })}
                </div>
                <div style={{ marginTop:20, display:'flex', gap:10, flexWrap:'wrap' }}>
                  {[
                    { label:'ACQUISITION GUIDE', view:'acquisition', color:'#34d399', icon:'◉', key:'a' },
                    { label:'RISK HEAT MAP',      view:'heat',        color:'#ff8833', icon:'▦', key:'h' },
                    { label:'ATTACK CHAINS',      view:'chains',      color:'#fbbf24', icon:'⟶', key:'c' },
                    { label:'TABLE VIEW',         view:'table',       color:'#a78bfa', icon:'≡', key:'t' },
                    { label:'ALL THREATS',        view:'threats',     color:'#00d4ff', icon:'◈', key:'t' },
                  ].map(n => (
                    <button key={n.view} onClick={() => setView(n.view)}
                      style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 16px', background:`${n.color}10`, border:`1px solid ${n.color}30`, borderRadius:4, color:n.color, fontSize:11, fontFamily:'var(--font-cond)', fontWeight:700, letterSpacing:1.5, cursor:'pointer', transition:'all .15s ease', position:'relative' }}
                      onMouseEnter={e => e.currentTarget.style.background=`${n.color}20`}
                      onMouseLeave={e => e.currentTarget.style.background=`${n.color}10`}>
                      <span>{n.icon}</span>{n.label}
                      <span style={{ position:'absolute', top:-6, right:4, fontSize:8, fontFamily:'var(--font-mono)', color:`${n.color}70`, background:'var(--bg-base)', padding:'0 3px', borderRadius:2, border:`1px solid ${n.color}30` }}>{n.key}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}

          {view === 'threats' && (
            <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
              <div style={{ flex: selected ? '0 0 46%' : 1, overflowY:'auto', padding:14, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
                  <span style={{ fontFamily:'var(--font-tech)', fontSize:10, color:'var(--text-dim)' }}>
                    <span style={{ color:'#00d4ff' }}>{filtered.length}</span>/{ALL_THREATS.length} threats
                    {selected && <span style={{ color:'var(--text-dim)', marginLeft:10, fontSize:9 }}>
                      [{filtered.findIndex(t=>t.id===selected.id)+1}/{filtered.length}]
                    </span>}
                  </span>
                  <div style={{ flex:1 }} />
                  <div style={{ position:'relative' }}>
                    <span style={{ position:'absolute', left:8, top:'50%', transform:'translateY(-50%)', color:'var(--text-dim)', fontSize:11 }}>⌕</span>
                    <input value={search} onChange={e => { setSearch(e.target.value); setSelected(null); }} placeholder="search threats, MITRE IDs…"
                      style={{ background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:3, padding:'5px 10px 5px 26px', color:'var(--text-primary)', fontSize:11, fontFamily:'var(--font-mono)', width:220, outline:'none', transition:'border-color .15s' }}
                      onFocus={e => e.target.style.borderColor='rgba(0,212,255,.3)'}
                      onBlur={e => e.target.style.borderColor='var(--border)'} />
                  </div>
                  {selected && <button onClick={() => setSelected(null)} style={{ padding:'5px 11px', background:'none', border:'1px solid var(--border)', borderRadius:3, color:'var(--text-muted)', cursor:'pointer', fontSize:10, fontFamily:'var(--font-cond)', letterSpacing:1 }}>✕ CLOSE</button>}
                </div>
                <div style={{ display:'grid', gap:9, gridTemplateColumns: selected ? '1fr' : 'repeat(auto-fill,minmax(285px,1fr))' }}>
                  {filtered.map(t => {
                    const sev = SEV_META[t.severity];
                    const pm = PILLAR_META[t.pillar];
                    const isSel = selected?.id === t.id;
                    const score = (t.risk?.l||2)*(t.risk?.i||2);
                    return (
                      <div key={t.id}
                        tabIndex={0}
                        role="button"
                        aria-selected={isSel}
                        data-threat-id={t.id}
                        onKeyDown={e => { if(e.key==='Enter'||e.key===' ') { e.preventDefault(); setSelected(p => { if(p?.id===t.id) return null; setPanelKey(k=>k+1); return t; }); }}}
                        onClick={() => { setSelected(p => { if(p?.id===t.id) return null; setPanelKey(k=>k+1); return t; }); }}
                        style={{ background:isSel ? 'var(--selected-bg)' : 'var(--bg-panel)', border:`1px solid ${isSel ? sev.color+'50' : 'var(--border)'}`, borderLeft:`3px solid ${sev.color}`, borderRadius:4, padding:13, cursor:'pointer', transition:'all .18s ease', outline:'none' }}
                        onMouseEnter={e => { if(!isSel) e.currentTarget.style.transform='translateY(-2px)'; }}
                        onMouseLeave={e => e.currentTarget.style.transform='none'}>
                        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:8 }}>
                          <div style={{ flex:1, marginRight:8 }}>
                            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6, flexWrap:'wrap' }}>
                              <SevBadge severity={t.severity} />
                              <span style={{ fontSize:9, color:pm.color, fontFamily:'var(--font-cond)' }}>{pm.icon} {pm.label}</span>
                              <span style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-mono)', marginLeft:'auto' }}>{t.sub}</span>
                            </div>
                            <div style={{ fontFamily:'var(--font-cond)', fontSize:14, fontWeight:700, color:'var(--text-primary)', letterSpacing:.5, lineHeight:1.2 }}>{t.title}</div>
                          </div>
                          <div style={{ textAlign:'center', flexShrink:0 }}>
                            <div style={{ fontSize:15, fontWeight:700, color:score>=20?'#ff3355':score>=9?'#ff8833':'#ffcc00', fontFamily:'var(--font-tech)', lineHeight:1 }}>{score}</div>
                            <div style={{ fontSize:7, color:'var(--text-dim)', fontFamily:'var(--font-tech)' }}>RISK</div>
                          </div>
                        </div>
                        <div style={{ fontSize:11, color:'var(--text-muted)', lineHeight:1.5, marginBottom:8, fontFamily:'var(--font-mono)' }}>{t.shortDesc}</div>
                        <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
                          {t.mitre?.slice(0,3).map(m => (
                            <span key={m.id} style={{ padding:'2px 6px', fontSize:9, fontFamily:'var(--font-mono)', background:'rgba(96,165,250,.08)', border:'1px solid rgba(96,165,250,.15)', borderRadius:2, color:'#60a5fa' }}>{m.id}</span>
                          ))}
                          {t.mitre?.length > 3 && <span style={{ fontSize:9, color:'var(--text-dim)' }}>+{t.mitre.length-3}</span>}
                          {t.runbook && <span style={{ marginLeft:'auto', fontSize:9, color:'#34d39960', fontFamily:'var(--font-cond)', letterSpacing:1 }}>⚡ RUNBOOK</span>}
                        </div>
                      </div>
                    );
                  })}
                  {filtered.length === 0 && (
                    <div style={{ gridColumn:'1/-1', textAlign:'center', padding:60, color:'var(--text-dim)', fontFamily:'var(--font-tech)', fontSize:11, letterSpacing:1 }}>NO THREATS MATCH CURRENT FILTERS</div>
                  )}
                </div>
              </div>
              {selected && (
                <div style={{ flex:1, minWidth:0, overflowY:'auto', padding:14, paddingLeft:0 }}>
                  <DetailPanel key={panelKey} threat={selected} onClose={() => setSelected(null)} panelKey={panelKey} />
                </div>
              )}
            </div>
          )}

          {view === 'table' && (
            <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
              <div style={{ flex: selected ? '0 0 50%' : 1, overflowY:'auto', padding:14, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
                  <span style={{ fontFamily:'var(--font-tech)', fontSize:10, color:'var(--text-dim)' }}>
                    <span style={{ color:'#00d4ff' }}>{filtered.length}</span>/{ALL_THREATS.length} threats
                  </span>
                  <div style={{ flex:1 }} />
                  <div style={{ position:'relative' }}>
                    <span style={{ position:'absolute', left:8, top:'50%', transform:'translateY(-50%)', color:'var(--text-dim)', fontSize:11 }}>⌕</span>
                    <input value={search} onChange={e => { setSearch(e.target.value); setSelected(null); }} placeholder="search threats, MITRE IDs…"
                      style={{ background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:3, padding:'5px 10px 5px 26px', color:'var(--text-primary)', fontSize:11, fontFamily:'var(--font-mono)', width:220, outline:'none' }}
                      onFocus={e => e.target.style.borderColor='rgba(0,212,255,.3)'}
                      onBlur={e => e.target.style.borderColor='var(--border)'} />
                  </div>
                  {selected && <button onClick={() => setSelected(null)} style={{ padding:'5px 11px', background:'none', border:'1px solid var(--border)', borderRadius:3, color:'var(--text-muted)', cursor:'pointer', fontSize:10, fontFamily:'var(--font-cond)', letterSpacing:1 }}>✕ CLOSE</button>}
                </div>
                <TableView threats={filtered} onSelect={t => setSelected(p => p?.id===t.id ? null : t)} selected={selected} />
              </div>
              {selected && (
                <div style={{ flex:1, minWidth:0, overflowY:'auto', padding:14, paddingLeft:0 }}>
                  <DetailPanel key={panelKey} threat={selected} onClose={() => setSelected(null)} panelKey={panelKey} />
                </div>
              )}
            </div>
          )}

          {view === 'chains' && (
            <div style={{ flex:1, overflowY:'auto', padding:16 }}>
              <ChainsView onSelect={onSelect} />
            </div>
          )}

          {view === 'heat' && (
            <div style={{ flex:1, overflowY:'auto', padding:16 }}>
              <HeatMap threats={filtered} onSelect={onSelect} />
            </div>
          )}

          {view === 'acquisition' && <AcquisitionView />}
        </div>
      </div>

      <div style={{ background:'var(--bg-sidebar)', borderTop:'1px solid var(--border)', padding:'5px 20px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
        <span style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-tech)', letterSpacing:1.5 }}>MITRE ATT&CK® FOR ENTERPRISE · AZURE THREAT RESEARCH MATRIX (MSTIC) · GPL-3.0</span>
        <div style={{ display:'flex', alignItems:'center', gap:14 }}>
          <span style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>j/k navigate · / search · esc close · t/h/c/a views</span>
          <span style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-tech)' }}>{ALL_THREATS.length} SCENARIOS · SENTINEL KQL · IR RUNBOOKS · ACQUISITION GUIDE</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
setTimeout(() => { if(window.dismissLoader) window.dismissLoader(); }, 200);
</script>
</body>
</html>
