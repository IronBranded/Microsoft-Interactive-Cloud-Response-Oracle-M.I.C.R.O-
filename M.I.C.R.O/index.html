<script>
// LOADER CANVAS
(function(){
  const canvas=document.getElementById('loader-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,nodes,edges,pulses,animId;
  const COLORS={node:['#0078d4','#00d4ff','#50e6ff','#0091b5','#005a9e'],edge:'#0d3a5c',pulse:'#00d4ff'};
  function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;initGraph();}
  function initGraph(){
    const count=Math.floor((W*H)/14000);
    nodes=Array.from({length:count},()=>{const a=Math.random()*Math.PI*2,r=.22+Math.random()*.28;return{x:W/2+Math.cos(a)*W*r*(.7+Math.random()*.5),y:H/2+Math.sin(a)*H*r*.55,r:1.5+Math.random()*2.5,color:COLORS.node[Math.floor(Math.random()*COLORS.node.length)],opacity:0,targetOpacity:.3+Math.random()*.7,birthTime:Date.now()+Math.random()*3000,pulsePhase:Math.random()*Math.PI*2};});
    edges=[];
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<160&&Math.random()<.35)edges.push({a:i,b:j,targetOpacity:.12+Math.random()*.2});}
    pulses=[];
  }
  function spawnPulse(){pulses.push({r:0,maxR:Math.max(W,H)*.65,alpha:.5,speed:2.2});}
  let lastPulse=0;
  function draw(ts){
    ctx.clearRect(0,0,W,H);
    const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.6);g.addColorStop(0,'#060f1e');g.addColorStop(1,'#020509');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    const now=Date.now();
    if(now-lastPulse>2200){spawnPulse();lastPulse=now;}
    pulses=pulses.filter(p=>p.r<p.maxR);
    pulses.forEach(p=>{p.r+=p.speed+p.r*.008;p.alpha=.5*(1-p.r/p.maxR);ctx.save();ctx.globalAlpha=p.alpha;ctx.strokeStyle=COLORS.pulse;ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(W/2,H/2,p.r,p.r*.55,0,0,Math.PI*2);ctx.stroke();ctx.restore();});
    nodes.forEach(n=>{if(now>n.birthTime)n.opacity=Math.min(n.opacity+.015,n.targetOpacity);});
    edges.forEach(e=>{const na=nodes[e.a],nb=nodes[e.b],vis=Math.min(na.opacity,nb.opacity);if(vis<=0)return;ctx.save();ctx.globalAlpha=vis*e.targetOpacity;ctx.strokeStyle=COLORS.edge;ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(nb.x,nb.y);ctx.stroke();ctx.restore();});
    nodes.forEach(n=>{if(n.opacity<=0)return;const pulse=Math.sin(ts*.001+n.pulsePhase)*.3+.7;ctx.save();ctx.globalAlpha=n.opacity*pulse;const gd=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*4);gd.addColorStop(0,n.color);gd.addColorStop(1,'transparent');ctx.fillStyle=gd;ctx.beginPath();ctx.arc(n.x,n.y,n.r*4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=n.opacity;ctx.fillStyle=n.color;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();ctx.restore();});
    animId=requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);resize();spawnPulse();animId=requestAnimationFrame(draw);
  const steps=[{t:'Authenticating via Entra ID…',p:12},{t:'Establishing Microsoft Graph session…',p:26},{t:'Loading Sentinel detection rules…',p:40},{t:'Mapping artifact acquisition sources…',p:54},{t:'Correlating MITRE ATT&CK mappings…',p:68},{t:'Indexing rogue app signatures…',p:80},{t:'Building Copilot & AI detections…',p:92},{t:'Threat matrix online.',p:98}];
  const statusEl=document.getElementById('loader-status'),barEl=document.getElementById('loader-bar'),stepEl=document.getElementById('loader-step');
  const delays=[0,900,1750,2600,3450,4300,5150,6000];
  steps.forEach((s,i)=>setTimeout(()=>{statusEl.textContent=s.t;barEl.style.width=s.p+'%';stepEl.textContent=`[ ${String(i+1).padStart(2,'0')} / ${steps.length} ]`;},delays[i]));
  window.dismissLoader=function(){cancelAnimationFrame(animId);const l=document.getElementById('loader');barEl.style.width='100%';statusEl.textContent='Threat matrix ready.';setTimeout(()=>{l.style.animation='loader-out .5s ease forwards';setTimeout(()=>{l.style.display='none';},520);},350);};
  setTimeout(window.dismissLoader,7500);
})();
</script>

    kql:`// Apps with broad permissions accessing sensitivity-labeled content\nCloudAppEvents\n| where ActionType in ("FileAccessed","MailItemsAccessed","FileDownloaded")\n| summarize\n    AccessCount = count(),\n    UniqueFiles = dcount(ObjectId)\n  by AppId = tostring(RawEventData.AppId), AppName = Application, bin(TimeGenerated, 1d)\n| where AccessCount > 500\n| order by AccessCount desc\n\n// Dormant app reactivation (no sign-in in 90d then active)\nAADServicePrincipalSignInLogs\n| where ResultType == "0"\n| summarize LastSeen = max(TimeGenerated) by ServicePrincipalName\n| where LastSeen < ago(90d)\n| join kind=inner (\n    AADServicePrincipalSignInLogs\n    | where ResultType == "0" and TimeGenerated > ago(7d)\n    | summarize RecentCount = count() by ServicePrincipalName\n) on ServicePrincipalName\n| project ServicePrincipalName, LastSeen, RecentCount`,

  { id:'azure-keyvault', pillar:'azure', sub:'Key Vault', severity:'critical', title:'Azure Key Vault Secret / Certificate Exfiltration',

  { id:'azure-storage-exfil', pillar:'azure', sub:'Storage', severity:'high', title:'Azure Storage Account Data Exfiltration',

  { id:'service-principal-abuse', pillar:'entra-id', sub:'Workload Identity', severity:'high', title:'Service Principal / Workload Identity Abuse',

    iocs:['Sign-in from service principal from unexpected IP or cloud hosting ASN','Service principal accessing resources at unusual hours or high volume','New credential added to existing app by unexpected account — see wi-credential-addition','AADServicePrincipalSignInLogs: SP sign-in from geographic location inconsistent with workload','FOCI indicator: token issued for Microsoft Teams client ID used to access Exchange or SharePoint'],

    azureMatrix:[{phase:'Initial Access',technique:'Leaked Service Principal Credential'},{phase:'Credential Access',technique:'FOCI Token Family Lateral Movement'},{phase:'Discovery',technique:'Tenant Enumeration via App-Level Permissions'}],
    kql:`// Service principal sign-ins from unexpected locations\nAADServicePrincipalSignInLogs\n| where ResultType == "0"\n| summarize Count = count(), IPs = make_set(IPAddress, 10)\n  by ServicePrincipalName, bin(TimeGenerated, 1d)\n| where Count > 1000\n\n// New credential added to app (high signal)\nAuditLogs\n| where OperationName in (\n    "Update application — Certificates and secrets management",\n    "Add service principal credentials",\n    "Update service principal"\n)\n| extend ModifiedBy = tostring(InitiatedBy.user.userPrincipalName)\n| extend AppName   = tostring(TargetResources[0].displayName)\n| project TimeGenerated, OperationName, AppName, ModifiedBy\n\n// FOCI detection: known first-party client IDs accessing unexpected resources\n// Reference known FOCI app IDs: github.com/secureworks/family-of-client-ids-research\nAADNonInteractiveUserSignInLogs\n| where AppId in (\n    "1fec8e78-bce4-4aaf-ab1b-5451cc387264",  // Microsoft Teams\n    "d3590ed6-52b3-4102-aeff-aad2292ab01c"   // Microsoft Office\n)\n| where ResourceDisplayName !in ("Microsoft Teams","Office 365")\n| project TimeGenerated, UserPrincipalName, AppId, ResourceDisplayName, IPAddress`,
    mitigations:['Use managed identities instead of service principals where possible (no credential to steal)','Implement Microsoft Entra Workload ID Premium for service principal risk detection','Rotate all service principal secrets on schedule (max 90 days, prefer certificates over secrets)','Alert on any new credential added to existing service principal','Scan code repositories for hardcoded credentials — implement pre-commit hooks','Monitor AADServicePrincipalSignInLogs for sign-in anomalies','Implement FOCI awareness: block or monitor token refresh from unexpected client IDs'],
    runbook:{ triage:['Identify affected service principal, its permissions, and compromised credential type','Determine how the credential was exposed (repo scan, CI/CD, Terraform state)','Estimate how long the credential may have been exposed','Check if FOCI token family abuse occurred — multiple first-party app resources accessed'], contain:['Immediately revoke and delete compromised credential from service principal','If leaked in repo: treat as fully compromised — rotate immediately regardless of access evidence','Disable SP temporarily pending investigation','Revoke all active tokens for SP','Remove any new credentials added by attacker'], investigate:['Pull AADServicePrincipalSignInLogs for SP in suspected window','Identify all resources accessed, APIs called, and data read or modified','Determine if attacker added new credentials to SP for persistence','Scan all code repos and CI/CD pipelines for remaining exposed credentials'], recover:['Re-issue new credential using Azure Key Vault with automated rotation','Re-enable SP only after new credential issued and old one fully purged','Implement credential scanning in all repos and CI/CD pipelines','Apply least-privilege permissions — remove any unused scopes'], escalate:['Escalate if SP has Directory.ReadWrite.All, Mail.ReadWrite, or RoleManagement.ReadWrite','Escalate if FOCI abuse is confirmed — indicates hands-on attacker with broad access','Notify compliance if SP accessed regulated or sensitive data'] },

function CopyBtn({ text }) {

/* ── RUNBOOK TAB ── */
function RunbookTab({ runbook, threatId }) {
  const [checked, setChecked] = useState({});
  if(!runbook) return <div style={{ textAlign:'center', padding:40, color:'var(--text-dim)', fontFamily:'var(--font-mono)', fontSize:12 }}>RUNBOOK NOT AVAILABLE</div>;
  const phases = [
    { key:'triage',     label:'TRIAGE',     color:'#f87171', icon:'⚡' },
    { key:'contain',    label:'CONTAIN',    color:'#fbbf24', icon:'🛡' },
    { key:'investigate',label:'INVESTIGATE',color:'#a78bfa', icon:'🔍' },
    { key:'recover',    label:'RECOVER',    color:'#34d399', icon:'↺' },
    { key:'escalate',   label:'ESCALATE IF',color:'#f472b6', icon:'▲' },
  ];
  const total = phases.reduce((s,p) => s + (runbook[p.key]?.length||0), 0);
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  return (
    <div>
      <div style={{ marginBottom:14, padding:'10px 14px', background:'var(--bg-base)', border:'1px solid var(--border)', borderRadius:4 }}>
        <div style={{ display:'flex', justifyContent:'space-between', fontSize:10, fontFamily:'var(--font-mono)', color:'var(--text-muted)', marginBottom:6 }}>
          <span>RUNBOOK PROGRESS</span><span style={{ color:'#00d4ff' }}>{pct}%</span>
        </div>
        <div style={{ height:3, background:'var(--border)', borderRadius:2 }}>
          <div style={{ height:3, borderRadius:2, width:`${pct}%`, background:'linear-gradient(90deg,#00d4ff,#34d399)', transition:'width .6s ease' }} />
        </div>
      </div>
      {phases.map(({ key, label, color, icon }) => {
        const items = runbook[key] || [];
        if(!items.length) return null;
        const doneCount = items.filter((_,i) => checked[`${key}-${i}`]).length;
        return (
          <div key={key} style={{ marginBottom:16 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
              <span style={{ fontSize:12 }}>{icon}</span>
              <span style={{ fontSize:9, fontFamily:'var(--font-mono)', letterSpacing:2, color }}>{label}</span>
              <span style={{ fontSize:9, fontFamily:'var(--font-mono)', color:'var(--text-dim)', marginLeft:'auto' }}>{doneCount}/{items.length}</span>
            </div>
            {items.map((item, i) => {
              const k = `${key}-${i}`;
              const isDone = !!checked[k];
              return (
                <div key={i} onClick={() => setChecked(p => ({ ...p, [k]: !p[k] }))}
                  style={{ display:'flex', gap:10, marginBottom:6, padding:'8px 12px', background:isDone ? `${color}08` : 'var(--bg-card)', border:`1px solid ${isDone ? color+'30' : 'var(--border)'}`, borderRadius:3, cursor:'pointer', alignItems:'flex-start', transition:'all .15s ease' }}>
                  <div style={{ width:16, height:16, borderRadius:3, flexShrink:0, marginTop:1, display:'flex', alignItems:'center', justifyContent:'center', transition:'all .15s ease', background:isDone ? `${color}25` : 'transparent', border:`1.5px solid ${isDone ? color : 'var(--border-mid)'}` }}>
                    {isDone && <span style={{ color, fontSize:10, lineHeight:1 }}>✓</span>}
                  </div>
                  <span style={{ fontSize:11, color:isDone ? `${color}cc` : 'var(--text-secondary)', fontFamily:'var(--font-mono)', lineHeight:1.5, textDecoration:isDone ? 'line-through' : 'none' }}>{item}</span>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

    const g = {};
    threats.forEach(t => {
      const k = `${t.risk.l}-${t.risk.i}`;
      if(!g[k]) g[k] = [];
      g[k].push(t);

    return g;
  }, [threats]);
  const cs = (l, i) => {
    const r = l*i;
    if(r>=20) return { bg:'rgba(255,51,85,.14)',  border:'rgba(255,51,85,.45)',  glow:'#ff3355' };

          <div style={{ display:'grid', gridTemplateColumns:'100px repeat(5,1fr)', gap:5, marginBottom:5 }}>
            <div style={{ display:'flex', alignItems:'flex-end', paddingBottom:4 }}>
              <span style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-cond)', letterSpacing:2 }}>IMPACT →</span>

                <div style={{ textAlign:'right' }}>
                  <div style={{ fontSize:11, color:'var(--text-muted)', fontFamily:'var(--font-cond)', fontWeight:700 }}>{l}</div>
                  <div style={{ fontSize:8, color:'var(--text-dim)', fontFamily:'var(--font-mono)', marginTop:1 }}>{labels[l]}</div>
                </div>
              </div>
              {impacts.map(i => {
                const key = `${l}-${i}`;
                const ct = grid[key] || [];
                const style = cs(l, i);
                const isExp = expanded === key;
                const score = l*i;
                return (
                  <div key={i} onClick={() => ct.length && setExpanded(isExp ? null : key)}
                    style={{ minHeight:90, background:ct.length ? (isExp ? style.bg.replace('14','22').replace('12','20').replace('10','18').replace('06','12') : style.bg) : 'rgba(255,255,255,.015)', border:`1px solid ${ct.length ? style.border : 'var(--border)'}`, borderRadius:4, padding:'8px 9px', display:'flex', flexDirection:'column', gap:4, cursor:ct.length ? 'pointer' : 'default', transition:'all .18s ease', boxShadow:ct.length ? `0 0 ${isExp?18:6}px ${style.glow}${isExp?'30':'14'}` : 'none', position:'relative' }}>
                    <div style={{ position:'absolute', bottom:5, right:7, fontFamily:'var(--font-mono)', fontSize:18, fontWeight:700, color:ct.length ? style.glow : 'var(--border)', opacity:.18, lineHeight:1 }}>{score}</div>
                    {ct.length > 0 && (
                      <div style={{ position:'absolute', top:6, right:7, background:`${style.glow}25`, border:`1px solid ${style.glow}40`, borderRadius:10, padding:'1px 6px', fontFamily:'var(--font-mono)', fontSize:10, fontWeight:700, color:style.glow, lineHeight:1.4 }}>{ct.length}</div>
                    )}
                    {ct.length > 0 ? (
                      <>
                        {ct.slice(0, isExp ? 99 : 3).map(t => (
                          <div key={t.id} onClick={e => { e.stopPropagation(); onSelect(t); }}
                            style={{ fontSize:10.5, color:style.glow, fontFamily:'var(--font-cond)', fontWeight:700, lineHeight:1.25, letterSpacing:.3, paddingRight:20, cursor:'pointer', transition:'opacity .12s' }}
                            onMouseEnter={e => e.currentTarget.style.opacity='.7'}
                            onMouseLeave={e => e.currentTarget.style.opacity='1'}>
                            {t.title}
                          </div>
                        ))}
                        {!isExp && ct.length > 3 && <div style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-mono)', marginTop:2 }}>+{ct.length-3} — click to expand</div>}
                      </>
                    ) : (
                      <div style={{ flex:1, display:'flex', alignItems:'center', justifyContent:'center' }}>
                        <div style={{ width:4, height:4, borderRadius:'50%', background:'var(--border)' }} />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── TABLE VIEW ── */
function TableView({ threats, onSelect, selected }) {
  const cols = [
    { label:'THREAT', flex:'minmax(0,2.5fr)' },
    { label:'SEV',    flex:'70px' },
    { label:'PILLAR', flex:'110px' },
    { label:'SUB',    flex:'100px' },
    { label:'MITRE',  flex:'110px' },
    { label:'RISK',   flex:'50px' },
    { label:'SHORT DESCRIPTION', flex:'minmax(0,2fr)' },
  ];
  return (
    <div style={{ overflowX:'auto' }}>
      {/* Header */}
      <div style={{ display:'grid', gridTemplateColumns:cols.map(c=>c.flex).join(' '), gap:0, padding:'6px 14px', borderBottom:'1px solid var(--border)', marginBottom:4 }}>
        {cols.map(c => (
          <div key={c.label} style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-cond)', letterSpacing:2 }}>{c.label}</div>
        ))}
      </div>
      {threats.map((t, i) => {
        const sev = SEV_META[t.severity];
        const pm = PILLAR_META[t.pillar];
        const isSel = selected?.id === t.id;
        const score = (t.risk?.l||2)*(t.risk?.i||2);
        return (
          <div key={t.id} onClick={() => onSelect(t)}
            style={{ display:'grid', gridTemplateColumns:cols.map(c=>c.flex).join(' '), gap:0, padding:'9px 14px', borderBottom:'1px solid #0a1120', background:isSel ? '#101824' : i%2===0 ? 'var(--bg-panel)' : 'transparent', borderLeft:`3px solid ${isSel ? sev.color : 'transparent'}`, cursor:'pointer', transition:'background .12s ease', alignItems:'center' }}
            onMouseEnter={e => { if(!isSel) e.currentTarget.style.background='rgba(255,255,255,.025)'; }}
            onMouseLeave={e => { if(!isSel) e.currentTarget.style.background=i%2===0?'var(--bg-panel)':'transparent'; }}>
            <div style={{ fontFamily:'var(--font-cond)', fontSize:13, fontWeight:700, color:isSel?sev.color:'var(--text-primary)', letterSpacing:.3, paddingRight:8, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{t.title}</div>
            <div><SevBadge severity={t.severity} /></div>
            <div style={{ fontSize:10, color:pm.color, fontFamily:'var(--font-cond)' }}>{pm.icon} {pm.label}</div>
            <div style={{ fontSize:10, color:'var(--text-dim)', fontFamily:'var(--font-mono)' }}>{t.sub}</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:3 }}>
              {t.mitre?.slice(0,2).map(m => (
                <span key={m.id} style={{ padding:'1px 5px', fontSize:9, fontFamily:'var(--font-mono)', background:'rgba(96,165,250,.08)', border:'1px solid rgba(96,165,250,.15)', borderRadius:2, color:'#60a5fa' }}>{m.id}</span>
              ))}
              {t.mitre?.length > 2 && <span style={{ fontSize:9, color:'var(--text-dim)' }}>+{t.mitre.length-2}</span>}
            </div>
            <div style={{ textAlign:'center' }}>
              <span style={{ fontSize:14, fontWeight:700, color:score>=20?'#ff3355':score>=9?'#ff8833':'#ffcc00', fontFamily:'var(--font-tech)' }}>{score}</span>
            </div>
            <div style={{ fontSize:10.5, color:'var(--text-muted)', fontFamily:'var(--font-mono)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{t.shortDesc}</div>
          </div>
        );
      })}
      {threats.length === 0 && (
        <div style={{ textAlign:'center', padding:48, color:'var(--text-dim)', fontFamily:'var(--font-tech)', fontSize:11 }}>NO THREATS MATCH CURRENT FILTERS</div>
      )}
    </div>
  );
}

/* ── ATTACK CHAINS ── */
function ChainsView({ onSelect }) {
  return (
    <div style={{ padding:'4px 0' }}>
      <div style={{ marginBottom:16 }}>
        <div style={{ fontFamily:'var(--font-cond)', fontSize:18, fontWeight:700, color:'var(--text-primary)', letterSpacing:1 }}>Attack Chain Visualization</div>
        <div style={{ fontSize:10, color:'var(--text-muted)', fontFamily:'var(--font-mono)', marginTop:3 }}>Pre-built kill chains — click any node to inspect threat details</div>
      </div>
      {ATTACK_CHAINS.map(chain => {
        const steps = chain.steps.map(id => ALL_THREATS.find(t => t.id === id)).filter(Boolean);
        return (
          <div key={chain.id} style={{ marginBottom:18, padding:'14px 16px', background:'var(--bg-card)', border:`1px solid ${chain.color}25`, borderRadius:4 }}>
            <div style={{ fontFamily:'var(--font-cond)', fontSize:13, fontWeight:700, color:chain.color, letterSpacing:1, marginBottom:14 }}>
              <span style={{ opacity:.5 }}>◈ </span>{chain.title}
            </div>
            <div style={{ display:'flex', alignItems:'center', flexWrap:'wrap', gap:0, overflowX:'auto', paddingBottom:2 }}>
              {steps.map((t, idx) => {
                const sev = SEV_META[t.severity];
                const pm = PILLAR_META[t.pillar];
                return (
                  <React.Fragment key={t.id}>
                    <div onClick={() => onSelect(t)}
                      style={{ background:`${sev.color}12`, border:`1px solid ${sev.color}44`, borderRadius:3, padding:'8px 12px', minWidth:130, maxWidth:170, cursor:'pointer', transition:'all .18s ease', flexShrink:0 }}
                      onMouseEnter={e => e.currentTarget.style.transform='scale(1.04)'}
                      onMouseLeave={e => e.currentTarget.style.transform='scale(1)'}>
                      <div style={{ fontSize:9, color:pm.color, fontFamily:'var(--font-cond)', marginBottom:3 }}>{pm.icon} {pm.label}</div>
                      <div style={{ fontSize:11, fontWeight:600, color:'var(--text-primary)', lineHeight:1.3 }}>{t.title}</div>
                      <div style={{ fontSize:9, color:sev.color, fontFamily:'var(--font-mono)', marginTop:3 }}>{t.severity.toUpperCase()}</div>
                    </div>
                    {idx < steps.length-1 && (
                      <div style={{ padding:'0 7px', color:chain.color, opacity:.5, fontSize:16, fontWeight:700, flexShrink:0 }}>→</div>
                    )}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

}

                  <div style={{ position:'relative' }}>
                    <span style={{ position:'absolute', left:8, top:'50%', transform:'translateY(-50%)', color:'var(--text-dim)', fontSize:11 }}>⌕</span>
                    <input value={search} onChange={e => { setSearch(e.target.value); setSelected(null); }} placeholder="search threats, MITRE IDs…"
                      style={{ background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:3, padding:'5px 10px 5px 26px', color:'var(--text-primary)', fontSize:11, fontFamily:'var(--font-mono)', width:220, outline:'none', transition:'border-color .15s' }}
                      onFocus={e => e.target.style.borderColor='rgba(0,212,255,.3)'}
                      onBlur={e => e.target.style.borderColor='var(--border)'} />
                  </div>
                  {selected && <button onClick={() => setSelected(null)} style={{ padding:'5px 11px', background:'none', border:'1px solid var(--border)', borderRadius:3, color:'var(--text-muted)', cursor:'pointer', fontSize:10, fontFamily:'var(--font-cond)', letterSpacing:1 }}>✕ CLOSE</button>}
                </div>
                <div style={{ display:'grid', gap:9, gridTemplateColumns: selected ? '1fr' : 'repeat(auto-fill,minmax(285px,1fr))' }}>
                  {filtered.map(t => {
                    const sev = SEV_META[t.severity];
                    const pm = PILLAR_META[t.pillar];
                    const isSel = selected?.id === t.id;
                    const score = (t.risk?.l||2)*(t.risk?.i||2);
                    return (
                      <div key={t.id} onClick={() => setSelected(p => p?.id===t.id ? null : t)}
                        style={{ background:isSel ? '#101824' : 'var(--bg-panel)', border:`1px solid ${isSel ? sev.color+'50' : 'var(--border)'}`, borderLeft:`3px solid ${sev.color}`, borderRadius:4, padding:13, cursor:'pointer', transition:'all .18s ease' }}
                        onMouseEnter={e => { if(!isSel) e.currentTarget.style.transform='translateY(-2px)'; }}
                        onMouseLeave={e => e.currentTarget.style.transform='none'}>
                        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:8 }}>
                          <div style={{ flex:1, marginRight:8 }}>
                            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6, flexWrap:'wrap' }}>
                              <SevBadge severity={t.severity} />
                              <span style={{ fontSize:9, color:pm.color, fontFamily:'var(--font-cond)' }}>{pm.icon} {pm.label}</span>
                              <span style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-mono)', marginLeft:'auto' }}>{t.sub}</span>
                            </div>
                            <div style={{ fontFamily:'var(--font-cond)', fontSize:14, fontWeight:700, color:'var(--text-primary)', letterSpacing:.5, lineHeight:1.2 }}>{t.title}</div>
                          </div>
                          <div style={{ textAlign:'center', flexShrink:0 }}>
                            <div style={{ fontSize:15, fontWeight:700, color:score>=20?'#ff3355':score>=9?'#ff8833':'#ffcc00', fontFamily:'var(--font-tech)', lineHeight:1 }}>{score}</div>
                            <div style={{ fontSize:7, color:'var(--text-dim)', fontFamily:'var(--font-tech)' }}>RISK</div>
                          </div>
                        </div>
                        <div style={{ fontSize:11, color:'var(--text-muted)', lineHeight:1.5, marginBottom:8, fontFamily:'var(--font-mono)' }}>{t.shortDesc}</div>
                        <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
                          {t.mitre?.slice(0,3).map(m => (
                            <span key={m.id} style={{ padding:'2px 6px', fontSize:9, fontFamily:'var(--font-mono)', background:'rgba(96,165,250,.08)', border:'1px solid rgba(96,165,250,.15)', borderRadius:2, color:'#60a5fa' }}>{m.id}</span>
                          ))}
                          {t.mitre?.length > 3 && <span style={{ fontSize:9, color:'var(--text-dim)' }}>+{t.mitre.length-3}</span>}
                          {t.runbook && <span style={{ marginLeft:'auto', fontSize:9, color:'#34d39960', fontFamily:'var(--font-cond)', letterSpacing:1 }}>⚡ RUNBOOK</span>}
                        </div>
                      </div>
                    );
                  })}
                  {filtered.length === 0 && (
                    <div style={{ gridColumn:'1/-1', textAlign:'center', padding:60, color:'var(--text-dim)', fontFamily:'var(--font-tech)', fontSize:11, letterSpacing:1 }}>
                      NO THREATS MATCH CURRENT FILTERS
                    </div>
                  )}
                </div>
              </div>
              {/* Detail panel */}
              {selected && (
                <div style={{ flex:1, minWidth:0, overflowY:'auto', padding:14, paddingLeft:0 }}>
                  <DetailPanel threat={selected} onClose={() => setSelected(null)} />
                </div>
              )}
            </div>
          )}

          {view === 'table' && (
            <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
              <div style={{ flex: selected ? '0 0 50%' : 1, overflowY:'auto', padding:14, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
                  <span style={{ fontFamily:'var(--font-tech)', fontSize:10, color:'var(--text-dim)' }}>
                    <span style={{ color:'#00d4ff' }}>{filtered.length}</span>/{ALL_THREATS.length} threats
                  </span>
                  <div style={{ flex:1 }} />
                  <div style={{ position:'relative' }}>
                    <span style={{ position:'absolute', left:8, top:'50%', transform:'translateY(-50%)', color:'var(--text-dim)', fontSize:11 }}>⌕</span>
                    <input value={search} onChange={e => { setSearch(e.target.value); setSelected(null); }} placeholder="search threats, MITRE IDs…"
                      style={{ background:'var(--bg-card)', border:'1px solid var(--border)', borderRadius:3, padding:'5px 10px 5px 26px', color:'var(--text-primary)', fontSize:11, fontFamily:'var(--font-mono)', width:220, outline:'none', transition:'border-color .15s' }}
                      onFocus={e => e.target.style.borderColor='rgba(0,212,255,.3)'}
                      onBlur={e => e.target.style.borderColor='var(--border)'} />
                  </div>
                  {selected && <button onClick={() => setSelected(null)} style={{ padding:'5px 11px', background:'none', border:'1px solid var(--border)', borderRadius:3, color:'var(--text-muted)', cursor:'pointer', fontSize:10, fontFamily:'var(--font-cond)', letterSpacing:1 }}>✕ CLOSE</button>}
                </div>
                <TableView threats={filtered} onSelect={t => setSelected(p => p?.id===t.id ? null : t)} selected={selected} />
              </div>
              {selected && (
                <div style={{ flex:1, minWidth:0, overflowY:'auto', padding:14, paddingLeft:0 }}>
                  <DetailPanel threat={selected} onClose={() => setSelected(null)} />
                </div>
              )}
            </div>
          )}

          {view === 'chains' && (
            <div style={{ flex:1, overflowY:'auto', padding:16 }}>
              <ChainsView onSelect={onSelect} />
            </div>
          )}

          {view === 'heat' && (
            <div style={{ flex:1, overflowY:'auto', padding:16 }}>
              <HeatMap threats={filtered} onSelect={onSelect} />
            </div>
          )}

          {view === 'acquisition' && <AcquisitionView />}
        </div>
      </div>

      {/* FOOTER */}
      <div style={{ background:'var(--bg-sidebar)', borderTop:'1px solid var(--border)', padding:'5px 20px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
        <span style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-tech)', letterSpacing:1.5 }}>MITRE ATT&CK® FOR ENTERPRISE · AZURE THREAT RESEARCH MATRIX (MSTIC) · GPL-3.0</span>
        <span style={{ fontSize:9, color:'var(--text-dim)', fontFamily:'var(--font-tech)' }}>{ALL_THREATS.length} SCENARIOS · SENTINEL KQL · IR RUNBOOKS · ACQUISITION GUIDE · WORKLOAD ID · COPILOT & AI</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
setTimeout(() => { if(window.dismissLoader) window.dismissLoader(); }, 200);
  </script>
</body>
</html>
